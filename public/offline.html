<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Học Hứng Khởi Tiểu Học - Ngoại tuyến</title>
    <meta name="theme-color" content="#F97316" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, #fff7ed 0%, #ffedd5 100%);
        font-family: Quicksand, Arial, sans-serif;
        color: #7c2d12;
        padding: 24px;
        box-sizing: border-box;
      }

      .card {
        width: min(100%, 420px);
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid #fdba74;
        border-radius: 24px;
        padding: 24px;
        box-shadow: 0 20px 45px rgba(249, 115, 22, 0.15);
        text-align: center;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 24px;
      }

      p {
        margin: 0 0 12px;
        line-height: 1.5;
      }

      a {
        display: inline-block;
        margin-top: 8px;
        padding: 12px 16px;
        border-radius: 999px;
        background: #f97316;
        color: white;
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div style="font-size: 48px; margin-bottom: 8px;">📚</div>
      <h1>Đang ngoại tuyến</h1>
      <p>Ứng dụng chưa tải đủ dữ liệu cho màn hình này. Khi có mạng lại, mở app một lần để cache đầy đủ rồi dùng offline ổn định hơn.</p>
      <p>Bạn vẫn có thể quay về trang chính nếu app shell đã được lưu trong máy.</p>
      <a href="./index.html">Mở lại ứng dụng</a>
    </div>
  </body>
  </html>
