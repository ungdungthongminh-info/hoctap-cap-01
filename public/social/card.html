<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1200, initial-scale=1.0" />
    <title>Học Hứng Khởi - Social Preview</title>
    <meta name="robots" content="noindex, nofollow" />
    <style>
      :root {
        --bg-deep: #07203a;
        --bg-soft: #0ea5e9;
        --panel: rgba(255, 255, 255, 0.9);
        --line: rgba(14, 165, 233, 0.18);
        --text-main: #0f172a;
        --text-muted: #475569;
        --accent: #f59e0b;
        --accent-2: #0ea5e9;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: linear-gradient(135deg, #e0f2fe, #fff7ed);
        font-family: "Segoe UI", "Arial", sans-serif;
      }

      body {
        position: relative;
      }

      .frame {
        position: fixed;
        inset: 0;
        overflow: hidden;
        background:
          radial-gradient(circle at 88% 14%, rgba(255, 217, 102, 0.55), transparent 24%),
          linear-gradient(135deg, #edf7ff 0%, #fff9ef 100%);
      }

      .art {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .art-fade {
        position: absolute;
        inset: 0;
        background:
          linear-gradient(90deg, rgba(7, 32, 58, 0.12) 0%, rgba(7, 32, 58, 0.05) 34%, rgba(255, 255, 255, 0) 56%),
          linear-gradient(90deg, rgba(255, 255, 255, 0) 52%, rgba(255, 255, 255, 0.76) 72%, rgba(255, 250, 240, 0.95) 100%);
      }

      .panel {
        position: absolute;
        top: 40px;
        right: 40px;
        width: 520px;
        padding: 30px 32px 28px;
        border-radius: 32px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.97), rgba(255, 255, 255, 0.88)),
          radial-gradient(circle at top right, rgba(14, 165, 233, 0.14), transparent 36%);
        border: 1px solid rgba(255, 255, 255, 0.9);
        box-shadow:
          0 30px 80px rgba(15, 23, 42, 0.12),
          inset 0 1px 0 rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(18px);
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 7px 13px;
        border-radius: 999px;
        background: rgba(14, 165, 233, 0.09);
        color: #0369a1;
        font-size: 16px;
        font-weight: 800;
        letter-spacing: 0.04em;
      }

      .eyebrow::before {
        content: "";
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: #0ea5e9;
        box-shadow: 0 0 18px rgba(14, 165, 233, 0.45);
      }

      h1 {
        margin: 18px 0 10px;
        color: var(--text-main);
        font-size: 54px;
        line-height: 1.04;
        letter-spacing: -0.04em;
      }

      h1 .accent {
        color: #0284c7;
      }

      .lead {
        margin: 0;
        color: var(--text-muted);
        font-size: 22px;
        line-height: 1.4;
        font-weight: 600;
      }

      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 20px;
      }

      .chip {
        display: inline-flex;
        align-items: center;
        min-height: 38px;
        padding: 0 15px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid var(--line);
        color: #0f172a;
        font-size: 16px;
        font-weight: 800;
        box-shadow: 0 12px 24px rgba(15, 23, 42, 0.06);
      }

      .share-url {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin-top: 22px;
        padding: 0 16px 0 10px;
        min-height: 44px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid rgba(14, 165, 233, 0.16);
        box-shadow: 0 12px 24px rgba(15, 23, 42, 0.06);
        color: #0369a1;
        font-size: 15px;
        font-weight: 900;
      }

      .share-url img {
        width: 26px;
        height: 26px;
      }

      .url {
        display: inline-flex;
        align-items: center;
        min-height: 36px;
        padding: 0 14px;
        border-radius: 999px;
        background: linear-gradient(135deg, #0f766e, #0ea5e9);
        color: #ffffff;
        font-size: 14px;
        font-weight: 800;
        box-shadow: 0 16px 32px rgba(14, 165, 233, 0.22);
      }
    </style>
  </head>
  <body>
    <div class="frame">
      <img class="art" src="./og-artwork.png" alt="" />
      <div class="art-fade"></div>

      <section class="panel">
        <div class="eyebrow">Ứng dụng học tập tiểu học</div>
        <h1>Học <span class="accent">Hứng Khởi</span><br />Tiểu Học</h1>
        <p class="lead">Học vui mỗi ngày cùng Dopi với bài học, luyện tập, mini-game và theo dõi tiến bộ rõ ràng.</p>

        <div class="chips">
          <span class="chip">Bài học</span>
          <span class="chip">Luyện tập</span>
          <span class="chip">Mini-game</span>
          <span class="chip">Theo dõi tiến bộ</span>
        </div>
        <div class="share-url">
          <img src="../icon-192.svg" alt="" />
          <span>Học vui, dễ dùng, thân thiện cho học sinh tiểu học</span>
        </div>
        <div class="share-url" style="margin-top: 14px;">
          <span class="url">hoctap-cap-01.vercel.app</span>
        </div>
      </section>
    </div>
  </body>
</html>
