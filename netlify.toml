[[redirects]]
  from = "/api/*"
  to = "https://hochungkhoi.site/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build]
  publish = "dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"
  VITE_WEB = "true"
  VITE_BASE_PATH = "/cap-01/"
